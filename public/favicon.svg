<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="heisencoder">
  <!-- Transparent background. A terminal prompt: a mint chevron ">" and a burnt
       orange underscore cursor "_". Each shape sits on a slightly fatter dark
       copy of itself, leaving a thin outline so the mark stays legible on any
       surface (light paper, dark header, browser tab). -->
  <!-- chevron: dark outline, then mint -->
  <polyline points="20,18 36,32 20,46" fill="none" stroke="#14150f" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="20,18 36,32 20,46" fill="none" stroke="#1f9e6f" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- underscore cursor: dark outline, then burnt orange -->
  <line x1="34" y1="46" x2="48" y2="46" stroke="#14150f" stroke-width="10" stroke-linecap="round"/>
  <line x1="34" y1="46" x2="48" y2="46" stroke="#e2691f" stroke-width="7" stroke-linecap="round"/>
</svg>
